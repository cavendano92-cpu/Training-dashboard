<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance & Training Dashboard</title>
    <!-- Tailwind CSS for clean, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for interactive elements */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans antialiased">

    <!-- Top Navigation / Header -->
    <header class="border-b border-gray-800 bg-gray-950/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                <span class="text-emerald-500">⚡</span> Performance Log
            </h1>
            <div id="connection-status" class="text-xs font-medium px-2.5 py-1 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">
                Connecting to Google Sheets...
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
        
        <!-- ERROR BANNER (Hidden by default, reveals with diagnostics if fetch fails) -->
        <div id="error-banner" class="hidden mb-8 p-4 bg-rose-950/40 border border-rose-900/50 rounded-xl text-rose-200">
            <div class="flex items-start gap-3">
                <span class="text-xl">⚠️</span>
                <div>
                    <h3 class="font-semibold text-rose-300 text-lg mb-1">Could not load data from Google Sheets</h3>
                    <p id="error-detail" class="text-sm text-rose-400/90 leading-relaxed"></p>
                </div>
            </div>
        </div>

        <!-- DASHBOARD BODY PLACEHOLDER -->
        <div id="dashboard-content" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Metric Card 1 -->
            <div class="bg-gray-950/40 border border-gray-800 rounded-xl p-6">
                <p class="text-sm font-medium text-gray-400">Total Recorded Sessions</p>
                <p id="metric-total-rows" class="text-3xl font-bold text-white mt-2">--</p>
            </div>
            <!-- Add more metric cards or charts here -->
        </div>

        <!-- DATA PREVIEW TABLE -->
        <div class="bg-gray-950/40 border border-gray-800 rounded-xl overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-800 bg-gray-950/20">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Raw Data Stream Preview</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm text-gray-300">
                    <thead class="bg-gray-900/50 text-gray-400 border-b border-gray-800">
                        <tr id="table-headers">
                            <!-- Headers injected via JavaScript -->
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-800/50">
                        <tr>
                            <td colspan="100%" class="px-6 py-12 text-center text-gray-500 italic">Waiting for data link initialization...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- CONFIGURATION & APP LOGIC -->
    <script>
        // 1. Core Spreadsheet Identifiers
        const SHEET_ID = '2PACX-1vSl2265IKCYyPylFPX1eSS0NvDEq6Rw3IdIY4iS2ZEXAoGgbZoe9p5TRLzZ-FDRCq5EbziGQk_C7G8I';
        const GID = '422384441'; // Your specific tab ID

        // 2. Fetch CSV Stream securely with diagnostic routing
        async function fetchCSV(gid) {
            let url;
            const cleanID = SHEET_ID.trim();
            
            if (cleanID.startsWith('2PACX-')) {
                url = `https://docs.google.com/spreadsheets/d/e/${cleanID}/pub?output=csv&gid=${gid}`;
            } else {
                url = `https://docs.google.com/spreadsheets/d/${cleanID}/export?format=csv&gid=${gid}`;
            }

            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP Error Status ${res.status}`);
                const text = await res.text();
                
                // Block if Google serves a standard web/login page layout instead of pure CSV strings
                if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
                    throw new Error('Google Sheets returned an HTML login page instead of raw CSV data.');
                }
                return parseCSV(text);
            } catch (err) {
                updateConnectionStatus('Connection Failed', 'danger');
                
                const errorBanner = document.getElementById('error-banner');
                const errorDetail = document.getElementById('error-detail');
                if (errorBanner && errorDetail) {
                    errorDetail.innerHTML = `
                        ${err.message}<br><br>
                        <strong>Diagnostic Step:</strong> <a href="${url}" target="_blank" class="text-rose-400 font-semibold underline hover:text-rose-300 transition">Click here to manually check your direct data link</a>. 
                        If this link downloads a clean CSV file but the page fails, your browser environment is blocking programmatic scripts. Uploading this file to GitHub Pages will automatically resolve this.
                    `;
                    errorBanner.style.display = 'block';
                }
                throw err;
            }
        }

        // 3. Robust RFC-compliant CSV Parser
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                const next = text[i+1];

                if (c === '"') {
                    if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (c === ',' && !inQuotes) {
                    row.push('');
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row);
                    row = [''];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            return lines;
        }

        // 4. Update the UI Connection Pill
        function updateConnectionStatus(message, type) {
            const statusEl = document.getElementById('connection-status');
            if (!statusEl) return;
            statusEl.innerText = message;
            statusEl.className = "text-xs font-medium px-2.5 py-1 rounded-full ";
            
            if (type === 'success') {
                statusEl.className += "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            } else if (type === 'danger') {
                statusEl.className += "bg-rose-500/10 text-rose-400 border border-rose-500/20";
            } else {
                statusEl.className += "bg-yellow-500/10 text-yellow-400 border border-yellow-500/20";
            }
        }

        // 5. Render Data to the UI Elements
        function renderDashboard(data) {
            if (!data || data.length === 0) return;
            
            const headers = data[0];
            const rows = data.slice(1).filter(r => r.join('').trim() !== ''); // Exclude blank lines

            // Update Metrics Dashboard Summary
            document.getElementById('metric-total-rows').innerText = rows.length;
            document.getElementById('dashboard-content').style.display = 'grid';

            // Populate Table Headers
            const headerRow = document.getElementById('table-headers');
            headerRow.innerHTML = headers.map(h => `<th class="px-6 py-3 font-semibold">${h}</th>`).join('');

            // Populate Table Rows (Limit preview window to top 15 records for crisp performance)
            const tableBody = document.getElementById('table-body');
            const displayRows = rows.slice(0, 15);
            
            tableBody.innerHTML = displayRows.map(row => `
                <tr class="hover:bg-gray-800/20 transition duration-150">
                    ${row.map(cell => `<td class="px-6 py-4 white-space-nowrap text-gray-300 max-w-xs truncate">${cell}</td>`).join('')}
                </tr>
            `).join('');

            updateConnectionStatus('Data Synchronized', 'success');
        }

        // 6. Application Entry Initialization Engine
        window.addEventListener('DOMContentLoaded', () => {
            fetchCSV(GID)
                .then(parsedData => {
                    renderDashboard(parsedData);
                })
                .catch(err => {
                    console.error('Dashboard Engine Error:', err);
                });
        });
    </script>
</body>
</html>
